repos:
  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tests/fixtures/
      - id: end-of-file-fixer
        exclude: ^tests/fixtures/
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # PHP CodeSniffer (code style)
  - repo: local
    hooks:
      - id: phpcs
        name: PHP_CodeSniffer
        entry: php vendor/bin/phpcs --standard=phpcs.xml -n
        language: system
        types: [php]
        pass_filenames: false

  # PHPStan (static analysis)
  - repo: local
    hooks:
      - id: phpstan
        name: PHPStan
        entry: php vendor/bin/phpstan analyse --memory-limit=512M --no-progress
        language: system
        types: [php]
        pass_filenames: false

  # PHPUnit (tests)
  - repo: local
    hooks:
      - id: phpunit
        name: PHPUnit
        entry: php vendor/bin/phpunit --no-progress
        language: system
        types: [php]
        pass_filenames: false
        stages: [pre-commit]

  # Composer validation
  - repo: local
    hooks:
      - id: composer-validate
        name: Composer Validate
        entry: composer validate --strict --no-interaction
        language: system
        files: composer\.json$
        pass_filenames: false
