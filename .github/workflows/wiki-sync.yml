name: Sync docs to Wiki

on:
  push:
    branches: [dev]
    paths:
      - 'docs/**'
      - '.github/workflows/wiki-sync.yml'

concurrency:
  group: wiki-sync
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-wiki:
    name: Sync docs to Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Sync to Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v5
        with:
          path: docs/
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: sync from ${{ github.sha }}'
          preprocess: false
