name: Auto-merge dependency updates

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Auto-merge bot PRs
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'renovate[bot]'

    steps:
      - name: Wait for CI checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 90); do
            OUTPUT=$(gh pr checks "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" 2>&1 || true)
            FILTERED=$(echo "$OUTPUT" | grep -v "Auto-merge")
            echo "$FILTERED"
            if echo "$FILTERED" | grep -q "fail"; then
              echo "CI check failed"
              exit 1
            fi
            if echo "$FILTERED" | grep -qE "pending|in_progress"; then
              sleep 10
              continue
            fi
            echo "All CI checks passed"
            exit 0
          done
          echo "Timeout waiting for checks"
          exit 1

      - name: Merge dependency update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash
