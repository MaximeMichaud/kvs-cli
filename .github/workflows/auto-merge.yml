name: Auto-merge dependency updates

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Auto-merge bot PRs
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'renovate[bot]'

    steps:
      - name: Wait for CI checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REQUIRED_CHECKS='[
            "PHP 8.1 - highest",
            "PHP 8.1 - lowest",
            "PHP 8.2 - highest",
            "PHP 8.3 - highest",
            "PHP 8.4 - highest",
            "PHP 8.5 - highest",
            "Lint & Static Analysis",
            "Build PHAR"
          ]'

          for i in $(seq 1 90); do
            CHECKS=$(gh pr checks "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --json name,bucket,workflow 2>/tmp/pr-checks.err || true)

            if [ -z "$CHECKS" ]; then
              cat /tmp/pr-checks.err
              sleep 10
              continue
            fi

            echo "$CHECKS" | jq -r '
              .[]
              | select(.workflow != "Auto-merge dependency updates")
              | "\(.bucket)\t\(.name)\t\(.workflow)"
            '

            MISSING=$(
              echo "$CHECKS" \
                | jq --argjson required "$REQUIRED_CHECKS" -r '
                  [
                    $required[] as $name
                    | select(any(.[]; .name == $name) | not)
                  ] | .[]
                '
            )
            FAILED=$(
              echo "$CHECKS" \
                | jq --argjson required "$REQUIRED_CHECKS" -r '
                  .[]
                  | select(.name as $name | $required | index($name))
                  | select(
                    .bucket == "fail"
                    or .bucket == "cancel"
                    or .bucket == "skipping"
                  )
                  | "\(.bucket) \(.name)"
                '
            )
            PENDING=$(
              echo "$CHECKS" \
                | jq --argjson required "$REQUIRED_CHECKS" -r '
                  .[]
                  | select(.name as $name | $required | index($name))
                  | select(.bucket != "pass")
                  | "\(.bucket) \(.name)"
                '
            )

            if [ -n "$FAILED" ]; then
              echo "CI check failed:"
              echo "$FAILED"
              exit 1
            fi

            if [ -n "$MISSING" ] || [ -n "$PENDING" ]; then
              if [ -n "$MISSING" ]; then
                echo "Waiting for required checks to appear:"
                echo "$MISSING"
              fi
              if [ -n "$PENDING" ]; then
                echo "Waiting for required checks to pass:"
                echo "$PENDING"
              fi
              sleep 10
              continue
            fi

            echo "All required CI checks passed"
            exit 0
          done
          echo "Timeout waiting for checks"
          exit 1

      - name: Merge dependency update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash
