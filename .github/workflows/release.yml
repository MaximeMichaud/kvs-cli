name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build PHAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, phar
          coverage: none
          tools: composer:v2
          ini-values: phar.readonly=0

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.3-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-composer-

      - name: Install dependencies (no dev)
        run: composer install --prefer-dist --no-progress --no-interaction --no-dev --optimize-autoloader

      - name: Build PHAR
        run: php -d phar.readonly=0 build.php

      - name: Verify PHAR
        run: |
          ./kvs.phar --version
          echo "PHAR size: $(du -h kvs.phar | cut -f1)"

      - name: Generate SHA256 checksum
        run: sha256sum kvs.phar > kvs.phar.sha256

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: kvs-phar
          path: |
            kvs.phar
            kvs.phar.sha256

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download PHAR artifact
        uses: actions/download-artifact@v4
        with:
          name: kvs-phar

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: KVS CLI ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          files: |
            kvs.phar
            kvs.phar.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
