name: CI
permissions:
  contents: read

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - '.pre-commit-config.yaml'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - '.pre-commit-config.yaml'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'

jobs:
  test:
    name: PHP ${{ matrix.php-version }} - ${{ matrix.deps }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        deps: ['highest']
        include:
          # Test lowest dependencies on PHP 8.1
          - php-version: '8.1'
            deps: 'lowest'
          # Coverage only on latest PHP with highest deps
          - php-version: '8.5'
            deps: 'highest'
            coverage: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, json
          coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}
          tools: composer:v2
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ matrix.deps }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-${{ matrix.deps }}-composer-

      - name: Install dependencies (lowest)
        if: matrix.deps == 'lowest'
        run: composer update --prefer-lowest --prefer-stable --no-progress --no-interaction

      - name: Install dependencies (highest)
        if: matrix.deps == 'highest'
        run: composer update --prefer-stable --no-progress --no-interaction

      - name: Show installed versions
        run: composer show --direct

      - name: Run PHPUnit tests
        run: composer test

      - name: Run PHPUnit with coverage
        if: matrix.coverage
        run: composer coverage

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, ctype, iconv, intl, dom, filter, json
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan
        run: composer phpstan

      - name: Run PHP_CodeSniffer
        run: composer phpcs

  build:
    name: Build PHAR
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [test, static-analysis]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, ctype, iconv, phar
          coverage: none
          tools: composer:v2
          ini-values: phar.readonly=0

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.1-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.1-composer-

      - name: Install dependencies (no dev)
        run: composer install --prefer-dist --no-progress --no-interaction --no-dev

      - name: Set dev version
        if: github.ref == 'refs/heads/dev'
        run: |
          BASE_VERSION=$(cat VERSION | tr -d '\n' | sed 's/-beta$//')
          echo "${BASE_VERSION}-dev-${GITHUB_SHA::7}" > VERSION
          echo "Dev version: $(cat VERSION)"

      - name: Build PHAR
        run: php -d phar.readonly=0 build.php

      - name: Verify PHAR
        run: ./kvs.phar --version

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: kvs-cli-phar
          path: kvs.phar
          retention-days: 30
